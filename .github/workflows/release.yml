name: Release

# Publishes fhe-oracle to PyPI when a v* tag is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens stored.
# Configure the matching publisher at:
#   https://pypi.org/manage/project/fhe-oracle/settings/publishing/
# with:
#   owner = BAder82t
#   repository = fhe-oracle-oss
#   workflow = release.yml
#   environment = pypi
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Twine metadata check
        run: |
          python -m pip install twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for PyPI Trusted Publishing via OIDC.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
