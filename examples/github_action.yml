# Copy this into .github/workflows/fhe-precision.yml in your project.
#
# Creates a PR-blocking check that fails when FHE Oracle finds an input
# causing divergence above ORACLE_THRESHOLD.
name: FHE Precision Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fhe-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FHE Oracle
        run: pip install fhe-oracle

      - name: Run Oracle
        run: python oracle_check.py
        env:
          ORACLE_THRESHOLD: "0.01"
          ORACLE_N_TRIALS: "500"

